<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Keyboard</title>
<style>
  /* ==================== Базовые стили и тема ==================== */
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --key: #262b36;
    --key-active: #323847;
    --key-special: #1f2530;
    --accent: #4f8cff;
    --accent-2: #2f6fe0;
    --punct: #3a2f4d;
    --punct-active: #6b4fa0;
    --text: #e8ebf0;
    --text-dim: #8a93a6;
    --danger: #ff6b6b;
    --radius: 14px;
    --kb-height: 320px;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overscroll-behavior: none;
  }

  .app {
    max-width: 440px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    position: relative;
  }

  /* ==================== Шапка ==================== */
  .header {
    padding: 14px 16px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .header h1 {
    font-size: 15px;
    margin: 0;
    color: var(--text-dim);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header h1 .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  /* ==================== Область сообщений ==================== */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    padding: 10px 14px;
    border-radius: 18px 18px 4px 18px;
    max-width: 80%;
    word-break: break-word;
    animation: pop .18s ease;
    line-height: 1.35;
  }
  @keyframes pop { from { transform: scale(.9); opacity: 0 } to { transform: scale(1); opacity: 1 } }
  .hint {
    align-self: center;
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    max-width: 90%;
    line-height: 1.4;
  }

  /* ==================== Поле ввода (свой курсор, без системной клавиатуры) ==================== */
  .inputbar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 12px;
    background: var(--panel);
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .input-field {
    flex: 1;
    min-height: 42px;
    max-height: 120px;
    overflow-y: auto;
    background: var(--key);
    border-radius: 21px;
    padding: 10px 16px;
    font-size: 16px;
    line-height: 1.35;
    border: 1px solid transparent;
    white-space: pre-wrap;
    word-break: break-word;
    cursor: text;
  }
  /* блокируем выделение/контекстное меню, чтобы вело себя как поле ввода-дисплей */
  .input-field { user-select: none; -webkit-user-select: none; }
  .input-field.placeholder { color: var(--text-dim); }

  /* Наш собственный мигающий курсор */
  .caret {
    display: inline-block;
    width: 2px;
    height: 1.15em;
    background: var(--accent);
    vertical-align: text-bottom;
    margin-left: 1px;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .send-btn {
    flex-shrink: 0;
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .1s;
  }
  .send-btn:active { transform: scale(.92); }
  .send-btn:disabled { background: var(--key); color: var(--text-dim); cursor: default; }

  /* ==================== Клавиатура ==================== */
  .keyboard {
    height: var(--kb-height);
    background: var(--panel);
    padding: 8px 6px calc(8px + env(safe-area-inset-bottom, 0px));
    display: flex;
    flex-direction: column;
    gap: 6px;
    border-top: 1px solid rgba(255,255,255,0.06);
    user-select: none;
  }

  .kb-status {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 2px;
    font-size: 11px;
    color: var(--text-dim);
    height: 16px;
  }
  .kb-status .status-txt { display: flex; align-items: center; gap: 6px; }
  .spinner {
    width: 11px; height: 11px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg) } }

  .kb-row {
    display: flex;
    gap: 5px;
    flex: 1;
    justify-content: center;
  }
  .key {
    flex: 1;
    background: var(--key);
    border: none;
    border-radius: 8px;
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s, transform .05s;
    min-width: 0;
    padding: 0;
  }
  .key:active { background: var(--key-active); transform: translateY(1px); }
  .key.special {
    background: var(--key-special);
    font-size: 13px;
    color: var(--text-dim);
    flex: 1.3;
  }
  .key.wide { flex: 3; }
  .key.accent { background: var(--accent-2); color:#fff; flex:1.5; }

  /* ==================== Режим слов ==================== */
  .words-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
  }
  .words-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    align-content: stretch;
    overflow-y: auto;
  }
  .chip {
    background: var(--key);
    border: none;
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    min-height: 44px;
    cursor: pointer;
    padding: 4px 6px;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    transition: background .1s, transform .05s;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chip:active { background: var(--accent); color:#fff; transform: scale(.96); }
  .chip.punct {
    background: var(--punct);
    font-size: 20px;
    font-weight: 600;
  }
  .chip.punct:active { background: var(--punct-active); color:#fff; }
  .chip.skeleton {
    background: linear-gradient(90deg, var(--key) 25%, var(--key-active) 50%, var(--key) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    color: transparent;
    pointer-events: none;
  }
  @keyframes shimmer { to { background-position: -200% 0 } }

  .words-controls { display: flex; gap: 5px; height: 46px; }

  .toast {
    position: absolute;
    bottom: calc(var(--kb-height) + 12px);
    left: 50%; transform: translateX(-50%);
    background: var(--danger);
    color: #fff;
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 13px;
    max-width: 90%;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    opacity: 0;
    transition: opacity .25s;
    pointer-events: none;
    z-index: 10;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="app">
  <!-- Шапка -->
  <div class="header">
    <h1><span class="dot"></span> AI Keyboard — набор словами</h1>
  </div>

  <!-- Лента сообщений -->
  <div class="messages" id="messages">
    <div class="hint">Наберите первое слово по буквам и нажмите «Пробел» — дальше клавиатура предложит готовые слова и знаки препинания 🤖</div>
  </div>

  <!-- Поле ввода (НЕ contenteditable — системная клавиатура не появляется) -->
  <div class="inputbar">
    <div class="input-field" id="input"></div>
    <button class="send-btn" id="sendBtn" title="Отправить">➤</button>
  </div>

  <!-- Клавиатура -->
  <div class="keyboard" id="keyboard">
    <div class="kb-status">
      <span class="status-txt" id="statusTxt">Режим: буквы</span>
      <span id="statusRight"></span>
    </div>
    <div id="kbBody" style="flex:1;display:flex;flex-direction:column;gap:6px;overflow:hidden;"></div>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
/* ============================================================
   AI-FIRST KEYBOARD — прототип
   Поле ввода без системной клавиатуры: текст хранится в JS,
   курсор рисуется вручную.
   ============================================================ */

/* ⬇️⬇️⬇️ ВСТАВЬТЕ СЮДА ВАШ КЛЮЧ DeepSeek ⬇️⬇️⬇️ */
const DEEPSEEK_API_KEY = "sk-5e015ac8a9a6473da729035363b622fc"; // например "sk-xxxxxxxxxxxxxxxx"
/* ⬆️⬆️⬆️ ------------------------------------- ⬆️⬆️⬆️ */

const DEEPSEEK_ENDPOINT = "https://api.deepseek.com/chat/completions";

/* Раскладка QWERTY (русская) */
const LAYOUT = [
  ["й","ц","у","к","е","н","г","ш","щ","з","х"],
  ["ф","ы","в","а","п","р","о","л","д","ж","э"],
  ["я","ч","с","м","и","т","ь","б","ю"]
];

/* Fallback-набор — слова и знаки препинания */
const FALLBACK_WORDS = [
  "и","в","не",",","что","как",".","это","!","с","?","очень"
];

/* Пунктуационные токены */
const PUNCTUATION = new Set([
  ",", ".", "!", "?", "…", "...", ":", ";", "—", "-", ")", "(",
  "?!", "!?", "»", "«"
]);
const ATTACH_LEFT = new Set([",", ".", "!", "?", "…", "...", ":", ";", "?!", "!?", ")", "»"]);

/* ==================== Состояние ==================== */
let text = "";             // ← ВЕСЬ введённый текст хранится здесь
let mode = "abc";          // "abc" | "words"
let isLoading = false;
let debounceTimer = null;
let lastRequestId = 0;
const PLACEHOLDER = "Сообщение...";

/* ==================== DOM ==================== */
const inputEl   = document.getElementById("input");
const kbBody    = document.getElementById("kbBody");
const statusTxt = document.getElementById("statusTxt");
const statusRight = document.getElementById("statusRight");
const messagesEl = document.getElementById("messages");
const sendBtn   = document.getElementById("sendBtn");
const toastEl   = document.getElementById("toast");

/* ==================== Работа с текстом и отрисовка поля ==================== */

function isPunct(token) { return PUNCTUATION.has(token); }

function getText() { return text; }

// Меняем текст и перерисовываем поле
function setText(newText) {
  text = newText;
  renderInput();
  updateSendBtn();
}

// Экранирование HTML (текст пользователя вставляем безопасно)
function escapeHtml(s) {
  return s.replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
}

// Рисуем содержимое поля + собственный мигающий курсор
function renderInput() {
  if (text.length === 0) {
    inputEl.classList.add("placeholder");
    inputEl.innerHTML = escapeHtml(PLACEHOLDER) + '<span class="caret"></span>';
  } else {
    inputEl.classList.remove("placeholder");
    inputEl.innerHTML = escapeHtml(text) + '<span class="caret"></span>';
  }
  // прокрутка поля к концу, если текст длинный
  inputEl.scrollTop = inputEl.scrollHeight;
}

function updateSendBtn() {
  sendBtn.disabled = text.trim().length === 0;
}

/* ==================== Рендер клавиатуры ==================== */

function renderKeyboard() {
  if (mode === "abc") renderAbc();
  else renderWords();
}

function renderAbc() {
  statusTxt.textContent = "Режим: буквы";
  statusRight.innerHTML = "";
  kbBody.innerHTML = "";

  LAYOUT.forEach(row => {
    const rowEl = document.createElement("div");
    rowEl.className = "kb-row";
    row.forEach(ch => {
      const btn = document.createElement("button");
      btn.className = "key";
      btn.textContent = ch;
      btn.onclick = () => onLetter(ch);
      rowEl.appendChild(btn);
    });
    kbBody.appendChild(rowEl);
  });

  const ctrl = document.createElement("div");
  ctrl.className = "kb-row";
  ctrl.appendChild(makeKey("Слова", "key special", switchToWords));
  ctrl.appendChild(makeKey("⌫", "key special", onBackspace));
  ctrl.appendChild(makeKey("Пробел", "key wide", onSpace));
  ctrl.appendChild(makeKey("Ввод", "key accent", onEnter));
  kbBody.appendChild(ctrl);
}

function renderWords(words) {
  statusTxt.innerHTML = isLoading
    ? '<span class="spinner"></span> LLM подбирает слова...'
    : "Режим: слова";
  kbBody.innerHTML = "";

  const wrap = document.createElement("div");
  wrap.className = "words-wrap";

  const grid = document.createElement("div");
  grid.className = "words-grid";

  if (isLoading || !words) {
    for (let i = 0; i < 12; i++) {
      const s = document.createElement("div");
      s.className = "chip skeleton";
      s.textContent = "···";
      grid.appendChild(s);
    }
  } else {
    words.slice(0, 12).forEach(w => {
      const chip = document.createElement("button");
      const punct = isPunct(w);
      chip.className = punct ? "chip punct" : "chip";
      const shown = w.length > 14 ? w.slice(0, 13) + "…" : w;
      chip.textContent = shown;
      chip.title = w;
      chip.onclick = () => onWord(w);
      grid.appendChild(chip);
    });
  }
  wrap.appendChild(grid);

  const ctrl = document.createElement("div");
  ctrl.className = "words-controls";
  ctrl.appendChild(makeKey("ABC", "key special", switchToAbc));
  ctrl.appendChild(makeKey("⌫", "key special", onBackspace));
  ctrl.appendChild(makeKey("Пробел", "key wide", onSpace));
  ctrl.appendChild(makeKey("Ввод", "key accent", onEnter));
  wrap.appendChild(ctrl);

  kbBody.appendChild(wrap);
}

function makeKey(label, cls, handler) {
  const b = document.createElement("button");
  b.className = cls;
  b.textContent = label;
  b.onclick = handler;
  return b;
}

/* ==================== Обработчики ввода ==================== */

function onLetter(ch) {
  setText(getText() + ch);
}

function onBackspace() {
  setText(getText().slice(0, -1));
  if (mode === "words") requestWords();
}

function onSpace() {
  const t = getText();
  if (t.length === 0 || t.endsWith(" ")) return;
  setText(t + " ");
  switchToWords();
}

function onEnter() {
  sendMessage();
}

function onWord(token) {
  let t = getText();
  if (isPunct(token) && ATTACH_LEFT.has(token)) {
    t = t.replace(/\s+$/, "");
    setText(t + token + " ");
  } else {
    const base = (t.endsWith(" ") || t.length === 0) ? t : t + " ";
    setText(base + token + " ");
  }
  requestWords();
}

/* ==================== Переключение режимов ==================== */

function switchToWords() {
  mode = "words";
  renderWords();
  requestWords();
}

function switchToAbc() {
  mode = "abc";
  renderAbc();
}

/* ==================== Отправка сообщения ==================== */

function sendMessage() {
  const t = getText().trim();
  if (!t) return;

  const msg = document.createElement("div");
  msg.className = "msg";
  msg.textContent = t;
  messagesEl.appendChild(msg);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  setText("");
  switchToAbc();
}

/* ==================== Запрос к DeepSeek (с debounce) ==================== */

function requestWords() {
  if (mode !== "words") return;
  isLoading = true;
  renderWords();
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(fetchWords, 350);
}

const SYSTEM_PROMPT =
`Ты — движок предиктивного ввода для мобильной клавиатуры.
Тебе дают начало сообщения на русском языке.
Верни СТРОГО валидный JSON-массив из 12 наиболее вероятных СЛЕДУЮЩИХ токенов,
отсортированных по убыванию вероятности.

Что такое токен:
- это либо одно слово на русском языке,
- либо ОДИН знак препинания как отдельный элемент массива.

Правила:
- обязательно включай уместные знаки препинания как отдельные элементы,
  например: "," "." "!" "?" "…" ":" "—" — если по смыслу фраза может так продолжиться;
- знаки препинания ставь на позиции, соответствующие их вероятности;
- слова — по одному слову, без знаков препинания внутри слова;
- без повторов;
- токены должны грамматически/пунктуационно продолжать фразу;
- только массив строк, без пояснений, без markdown, без тройных кавычек.

Пример ответа: ["привет",",","как","что",".","спасибо","!","хочу","давай","можно","?","сегодня"]`;

async function fetchWords() {
  const requestId = ++lastRequestId;
  const context = getText();

  if (!DEEPSEEK_API_KEY) {
    finishWords(FALLBACK_WORDS, requestId);
    showToast("API-ключ не задан — показаны запасные слова");
    return;
  }

  try {
    const resp = await fetch(DEEPSEEK_ENDPOINT, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + DEEPSEEK_API_KEY
      },
      body: JSON.stringify({
        model: "deepseek-chat",
        temperature: 0.3,
        max_tokens: 200,
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: "Текст: «" + context + "». Дай 12 следующих токенов (слова и знаки препинания)." }
        ]
      })
    });

    if (!resp.ok) throw new Error("HTTP " + resp.status);

    const data = await resp.json();
    const raw = data?.choices?.[0]?.message?.content ?? "";
    const words = parseWords(raw);

    if (words.length === 0) throw new Error("empty/garbage");

    finishWords(words, requestId);

  } catch (err) {
    console.warn("DeepSeek error:", err);
    finishWords(FALLBACK_WORDS, requestId);
    showToast("Не удалось получить слова — показаны запасные");
  }
}

function finishWords(words, requestId) {
  if (requestId !== lastRequestId) return;
  isLoading = false;
  if (mode === "words") renderWords(words);
}

function parseWords(raw) {
  if (!raw) return [];
  let str = raw.trim();
  str = str.replace(/```json/gi, "").replace(/```/g, "").trim();
  const start = str.indexOf("[");
  const end = str.lastIndexOf("]");
  if (start !== -1 && end !== -1 && end > start) {
    str = str.slice(start, end + 1);
  }
  try {
    const arr = JSON.parse(str);
    if (!Array.isArray(arr)) return [];

    const seen = new Set();
    const out = [];
    for (let w of arr) {
      if (typeof w !== "string") continue;
      w = w.trim();
      if (!w) continue;

      if (isPunct(w)) {
        if (seen.has(w)) continue;
        seen.add(w);
        out.push(w);
        if (out.length >= 12) break;
        continue;
      }

      w = w.replace(/^[.,!?;:"'«»()…]+/, "")
           .replace(/[.,!?;:"'«»()…]+$/, "")
           .trim();
      if (!w) continue;

      const key = w.toLowerCase();
      if (seen.has(key)) continue;
      seen.add(key);
      out.push(w);
      if (out.length >= 12) break;
    }
    return out;
  } catch (e) {
    return [];
  }
}

/* ==================== Toast ==================== */
let toastTimer = null;
function showToast(txt) {
  toastEl.textContent = txt;
  toastEl.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove("show"), 3000);
}

/* ==================== Физическая клавиатура (только десктоп) ==================== */
// На телефоне системная клавиатура не появляется, поэтому это не мешает.
// На ПК позволяет печатать «вживую» для удобства тестирования.
window.addEventListener("keydown", (e) => {
  // игнорируем сочетания с Ctrl/Alt/Meta
  if (e.ctrlKey || e.altKey || e.metaKey) return;

  if (e.key === "Enter") { e.preventDefault(); sendMessage(); return; }
  if (e.key === "Backspace") { e.preventDefault(); onBackspace(); return; }
  if (e.key === " ") { e.preventDefault(); onSpace(); return; }

  // одиночный печатаемый символ
  if (e.key.length === 1) {
    e.preventDefault();
    setText(getText() + e.key);
  }
});

/* ==================== Инициализация ==================== */
renderInput();
renderKeyboard();
updateSendBtn();
</script>
</body>
</html>
