<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Keyboard</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0b141a;
    overflow: hidden;
  }
  .phone {
    max-width: 440px;
    margin: 0 auto;
    height: 100vh;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #0b141a;
    position: relative;
  }

  /* Header */
  .header {
    background: #202c33;
    color: #e9edef;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 16px;
    border-bottom: 1px solid #2a3942;
  }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg,#00a884,#0088cc);
    display:flex;align-items:center;justify-content:center;
    font-size: 18px;
  }
  .header .name { font-weight: 600; }
  .header .status { font-size: 12px; color:#8696a0; }

  /* Chat area */
  .chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background-image: linear-gradient(rgba(11,20,26,.95),rgba(11,20,26,.95));
  }
  .bubble {
    max-width: 75%;
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 15px;
    line-height: 1.35;
    word-wrap: break-word;
  }
  .bubble.me {
    align-self: flex-end;
    background: #005c4b;
    color: #e9edef;
    border-bottom-right-radius: 2px;
  }
  .bubble.them {
    align-self: flex-start;
    background: #202c33;
    color: #e9edef;
    border-bottom-left-radius: 2px;
  }

  /* Input row */
  .inputbar {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px 10px;
    background: #0b141a;
  }
  .inputwrap {
    flex: 1;
    background: #2a3942;
    border-radius: 22px;
    padding: 10px 14px;
    min-height: 44px;
    color: #e9edef;
    font-size: 16px;
    line-height: 1.3;
    display: flex;
    align-items: center;
    overflow-x: auto;
    white-space: nowrap;
  }
  .inputwrap .cursor {
    display:inline-block;width:2px;height:20px;background:#00a884;
    animation: blink 1s steps(1) infinite; margin-left:1px;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .placeholder { color:#8696a0; }
  .sendbtn {
    width: 44px; height: 44px; border-radius: 50%;
    background: #00a884; border: none; color: white;
    font-size: 20px; cursor: pointer; flex-shrink: 0;
  }

  /* Keyboard */
  .keyboard {
    background: #1c2b33;
    padding: 6px 4px calc(6px + env(safe-area-inset-bottom));
    user-select: none;
  }
  .kb-status {
    display:flex; align-items:center; justify-content:space-between;
    padding: 2px 8px 6px; font-size: 11px; color:#8696a0;
    min-height: 18px;
  }
  .kb-status .mode { color:#00a884; font-weight:600; }
  .kb-status .loader {
    display:flex; align-items:center; gap:5px; color:#8696a0;
  }
  .dot-spin {
    width:10px;height:10px;border:2px solid #3a4a52;border-top-color:#00a884;
    border-radius:50%;animation:spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg);} }

  .kb-row {
    display: flex;
    gap: 5px;
    margin-bottom: 6px;
    justify-content: center;
  }
  .key {
    flex: 1;
    min-width: 0;
    height: 42px;
    background: #3b4a54;
    border: none;
    border-radius: 6px;
    color: #e9edef;
    font-size: 17px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .08s;
    padding: 0 2px;
  }
  .key:active { background: #55666f; }
  .key.wide { flex: 1.6; }
  .key.fn { background: #2a3942; font-size: 14px; }

  /* Word keys */
  .words-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 5px;
    margin-bottom: 6px;
  }
  .wordkey {
    background: #2a3942;
    border: 1px solid #3b4a54;
    border-radius: 8px;
    color: #e9edef;
    font-size: 14px;
    padding: 11px 4px;
    cursor: pointer;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background .1s;
  }
  .wordkey:active { background: #005c4b; }
  .wordkey.skeleton {
    background: #24333b;
    color: transparent;
    position: relative;
    overflow: hidden;
    border-color:#24333b;
  }
  .wordkey.skeleton::after {
    content:"";position:absolute;inset:0;
    background:linear-gradient(90deg,transparent,#33454e,transparent);
    animation: shimmer 1.2s infinite;
  }
  @keyframes shimmer { 100% { transform: translateX(100%);} 0%{transform:translateX(-100%);} }

  .kb-actions {
    display:flex; gap:5px;
  }
  .kb-actions .key { height: 40px; }

  /* API modal */
  .modal {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.7);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; z-index: 100;
  }
  .modal.hidden { display:none; }
  .modal-box {
    background: #202c33; border-radius: 14px; padding: 22px;
    width: 100%; color:#e9edef;
  }
  .modal-box h3 { margin: 0 0 6px; }
  .modal-box p { color:#8696a0; font-size:13px; margin: 0 0 16px; }
  .modal-box input {
    width: 100%; padding: 12px; border-radius: 8px;
    border: 1px solid #3b4a54; background:#0b141a; color:#e9edef;
    font-size: 14px; margin-bottom: 14px;
  }
  .modal-box button {
    width: 100%; padding: 12px; border-radius: 8px; border:none;
    background:#00a884; color:white; font-size:15px; font-weight:600;
    cursor:pointer;
  }
  .gear {
    margin-left:auto; cursor:pointer; color:#8696a0; font-size:20px;
    background:none;border:none;
  }
</style>
</head>
<body>
<div class="phone">

  <div class="header">
    <div class="avatar">🤖</div>
    <div>
      <div class="name">AI Keyboard</div>
      <div class="status">клавиатура из слов</div>
    </div>
    <button class="gear" onclick="openModal()">⚙</button>
  </div>

  <div class="chat" id="chat">
    <div class="bubble them">Привет! Попробуй набрать сообщение. После первого слова буквы превратятся в слова 👇</div>
  </div>

  <div class="inputbar">
    <div class="inputwrap" id="inputwrap">
      <span class="placeholder" id="placeholder">Сообщение</span>
      <span id="typed"></span><span class="cursor"></span>
    </div>
    <button class="sendbtn" onclick="sendMessage()">➤</button>
  </div>

  <div class="keyboard" id="keyboard">
    <div class="kb-status">
      <span class="mode" id="mode">режим: буквы</span>
      <span class="loader" id="loader" style="visibility:hidden"><span class="dot-spin"></span>AI думает…</span>
    </div>
    <div id="kb-body"></div>
  </div>

  <!-- API key modal -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <h3>DeepSeek API ключ</h3>
      <p>Ключ хранится только в твоём браузере (localStorage). Получить: platform.deepseek.com</p>
      <input type="password" id="apikey" placeholder="sk-...">
      <button onclick="saveKey()">Сохранить</button>
    </div>
  </div>

</div>

<script>
// ---------- State ----------
let text = "";                 // текущий текст в инпуте
let mode = "letters";          // letters | words
let apiKey = localStorage.getItem("deepseek_key") || "";
let shift = true;              // капитализация первой буквы
let loadingWords = false;

const qwerty = [
  ["й","ц","у","к","е","н","г","ш","щ","з","х"],
  ["ф","ы","в","а","п","р","о","л","д","ж","э"],
  ["я","ч","с","м","и","т","ь","б","ю"]
];

// ---------- Init ----------
if (!apiKey) openModal();
render();

// ---------- API modal ----------
function openModal(){ document.getElementById("modal").classList.remove("hidden"); document.getElementById("apikey").value = apiKey; }
function saveKey(){
  apiKey = document.getElementById("apikey").value.trim();
  localStorage.setItem("deepseek_key", apiKey);
  document.getElementById("modal").classList.add("hidden");
}

// ---------- Input rendering ----------
function updateInput(){
  const ph = document.getElementById("placeholder");
  const typed = document.getElementById("typed");
  typed.textContent = text;
  ph.style.display = text.length ? "none" : "inline";
  // авто-скролл инпута
  const w = document.getElementById("inputwrap");
  w.scrollLeft = w.scrollWidth;
}

// ---------- Determine mode ----------
function recomputeMode(){
  // Режим "слова" включается, когда есть хотя бы одно завершённое слово (текст заканчивается пробелом)
  // либо когда уже начат режим слов
  const trimmed = text.trimEnd();
  const hasWord = trimmed.split(/\s+/).filter(Boolean).length >= 1;
  const endsWithSpace = text.length > 0 && text.endsWith(" ");
  if (hasWord && endsWithSpace) {
    if (mode !== "words") { mode = "words"; fetchWords(); }
  }
}

// ---------- Key handlers ----------
function typeLetter(ch){
  if (shift && mode==="letters") { ch = ch.toUpperCase(); shift=false; }
  text += ch;
  updateInput(); render();
}
function typeSpace(){
  if (text.length===0 || text.endsWith(" ")) return;
  text += " ";
  updateInput();
  recomputeMode();
  render();
}
function backspace(){
  text = text.slice(0,-1);
  if (text.length===0) { mode="letters"; shift=true; }
  updateInput(); render();
}
function typeWord(word){
  if (word==="") return;
  // добавляем слово + пробел
  if (text.length && !text.endsWith(" ")) text += " ";
  text += word + " ";
  updateInput();
  fetchWords(); // сразу новые предсказания
  render();
}
function switchToLetters(){ mode="letters"; render(); }

function sendMessage(){
  const t = text.trim();
  if (!t) return;
  const chat = document.getElementById("chat");
  const b = document.createElement("div");
  b.className = "bubble me";
  b.textContent = t;
  chat.appendChild(b);
  chat.scrollTop = chat.scrollHeight;
  text = ""; mode="letters"; shift=true;
  updateInput(); render();
}

// ---------- Render keyboard ----------
function render(){
  document.getElementById("mode").textContent =
    mode==="words" ? "режим: слова (AI)" : "режим: буквы";
  const body = document.getElementById("kb-body");
  body.innerHTML = "";

  if (mode === "letters"){
    renderQwerty(body);
  } else {
    renderWords(body);
  }
}

function renderQwerty(body){
  qwerty.forEach((row,i)=>{
    const r = document.createElement("div");
    r.className="kb-row";
    if(i===2){
      const sh=makeKey(shift?"⇧":"⇧","fn wide", ()=>{shift=!shift;render();});
      r.appendChild(sh);
    }
    row.forEach(ch=>{
      const label = shift ? ch.toUpperCase() : ch;
      r.appendChild(makeKey(label,"", ()=>typeLetter(ch)));
    });
    if(i===2){
      r.appendChild(makeKey("⌫","fn wide", backspace));
    }
    body.appendChild(r);
  });
  // bottom row
  const r = document.createElement("div");
  r.className="kb-row";
  r.appendChild(makeKey("123","fn", ()=>{}));
  r.appendChild(makeKey("пробел","wide", typeSpace));
  const sp = r.lastChild; sp.style.flex="4";
  r.appendChild(makeKey("↵","fn", sendMessage));
  body.appendChild(r);
}

function makeKey(label,cls,onclick){
  const b=document.createElement("button");
  b.className="key "+cls;
  b.textContent=label;
  b.onclick=onclick;
  return b;
}

let currentWords = [];
function renderWords(body){
  const grid=document.createElement("div");
  grid.className="words-grid";
  const items = loadingWords ? new Array(12).fill(null) : currentWords;
  (items.length?items:new Array(12).fill(null)).forEach(w=>{
    const b=document.createElement("div");
    if(w===null){
      b.className="wordkey skeleton";
      b.textContent="...";
    } else {
      b.className="wordkey";
      b.textContent=w;
      b.onclick=()=>typeWord(w);
    }
    grid.appendChild(b);
  });
  body.appendChild(grid);

  // action row
  const r=document.createElement("div");
  r.className="kb-actions";
  r.appendChild(makeKey("⌨ буквы","fn wide", switchToLetters));
  r.appendChild(makeKey("⌫","fn", backspace));
  r.appendChild(makeKey("␣","fn", typeSpace));
  r.appendChild(makeKey("↵ отпр","fn wide", sendMessage));
  body.appendChild(r);
}

// ---------- DeepSeek prediction ----------
async function fetchWords(){
  if(!apiKey){ openModal(); return; }
  loadingWords = true;
  document.getElementById("loader").style.visibility="visible";
  render();

  const context = text.trim();
  const prompt =
`Ты — предиктивная клавиатура. Пользователь пишет сообщение на русском.
Текущий текст: "${context}"
Предложи РОВНО 12 наиболее вероятных следующих слов, которые пользователь захочет напечатать дальше.
Слова должны быть разнообразными по смыслу (чтобы покрыть разные намерения), короткими, готовыми к вставке.
Учитывай грамматику и естественное продолжение фразы.
Ответь ТОЛЬКО валидным JSON-массивом из 12 строк, без пояснений. Пример: ["привет","как","дела","что","ты","сегодня","хочу","мне","очень","это","было","спасибо"]`;

  try{
    const res = await fetch("https://api.deepseek.com/chat/completions",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "Authorization":"Bearer "+apiKey
      },
      body: JSON.stringify({
        model:"deepseek-chat",
        messages:[{role:"user",content:prompt}],
        temperature:0.7,
        max_tokens:200
      })
    });
    const data = await res.json();
    let content = data.choices[0].message.content.trim();
    // вытащить JSON
    content = content.replace(/```json/gi,"").replace(/```/g,"").trim();
    const m = content.match(/\[[\s\S]*\]/);
    if(m) content = m[0];
    let words = JSON.parse(content);
    words = words.filter(w=>typeof w==="string").slice(0,12);
    currentWords = words;
  }catch(e){
    console.error(e);
    currentWords = ["и","в","не","на","что","это","как","я","ты","мы","да","нет"];
  }
  loadingWords=false;
  document.getElementById("loader").style.visibility="hidden";
  render();
}

updateInput();
</script>
</body>
</html>
